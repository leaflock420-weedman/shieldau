# ShieldAU — static PWA + Agora token API
services:
  - type: web
    name: shieldau
    runtime: static
    repo: https://github.com/leaflock420-weedman/shieldau
    branch: main
    buildCommand: echo "Static PWA — no build step"
    staticPublishPath: docs
    pullRequestPreviewsEnabled: true
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
    headers:
      - path: /sw.js
        name: Cache-Control
        value: no-cache
      - path: /manifest.json
        name: Cache-Control
        value: no-cache

  - type: web
    name: shieldau-api
    runtime: node
    repo: https://github.com/leaflock420-weedman/shieldau
    branch: main
    rootDir: api
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false