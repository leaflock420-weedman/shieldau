# ShieldAU — Node serves docs/ + Agora token API on one URL
services:
  - type: web
    name: shieldau
    runtime: node
    repo: https://github.com/leaflock420-weedman/shieldau
    branch: main
    rootDir: api
    buildCommand: npm install
    startCommand: npm start
    plan: free
    pullRequestPreviewsEnabled: true
    envVars:
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false